{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow p-5" style="max-width: 500px; width: 100%; border-radius: 15px;">
        <h2 class="text-center mb-4">📝 Add / Edit Note</h2>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                {{ form.title.label_tag }}
                {{ form.title }}
            </div>

            <div class="mb-3">
                {{ form.content.label_tag }}
                {{ form.content }}
            </div>

            <div class="mb-3">
                {{ form.color.label_tag }}
                {{ form.color }}
            </div>

            <button type="submit" class="btn btn-primary w-100">Save</button>
        </form>
    </div>
</div>
{% endblock %}
