<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sticky Notes{% endblock %}</title>

    {% load static %} <!--Django ka template tag jo static files (CSS, JS, images) load karne ke liye use hota hai -->

    <link rel="stylesheet" href="{% static 'notes/css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'note_list' %}">Sticky Notes</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        {% if user.is_authenticated %}
          <li class="nav-item">
            <span class="nav-link disabled">Hello, {{ user.username }}</span>
          </li>
          <li class="nav-item">
            <form action="{% url 'logout' %}" method="POST" class="d-inline ms-2">
              {% csrf_token %} <!-- Django me form ke liye security token generate karta hai taake CSRF attacks se bachaya ja sake -->
              <button class="btn btn-danger btn-sm">Logout</button>
            </form>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<hr class="m-0">

<main class="container my-4"> <!-- Page ka main content container. -->
    {% block content %}{% endblock %} <!-- Her page me unique content insert karne ke liye Django template block.-->

</main>

<footer class="py-3 mt-auto border-top">
    <div class="container text-center">
        <small class="text-muted">&copy; 2026 Sticky Notes. All rights reserved.</small>
        <div class="mt-1">
            <a href="#" class="text-decoration-none me-2">About</a>
            <a href="#" class="text-decoration-none">Contact</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
