{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="card p-4 shadow neumorphic-card" style="max-width: 450px; width: 100%; border-radius: 15px; text-align: center;">
        <h2 class="text-gradient mb-3"> Delete Note</h2>
        <p class="mb-4 text-muted">Are you sure you want to delete this note?</p>
        
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-gradient w-100 mb-2">Yes, Delete</button>
            <a href="{% url 'note_list' %}" class="btn btn-outline-secondary w-100">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
